name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-unix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[build]"
      - run: pyinstaller ask.spec
      - name: Package
        run: |
          cd dist
          cp -r ../shell .
          tar -czf ask-${{ matrix.os }}-full.tar.gz ask shell/
      - uses: actions/upload-artifact@v4
        with:
          name: ask-${{ matrix.os }}
          path: dist/ask-${{ matrix.os }}-full.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[build]"
      - run: pyinstaller ask.spec
      - name: Package
        shell: powershell
        run: |
          cd dist
          Copy-Item -Path ..\shell\ask.ps1 -Destination .
          Compress-Archive -Path ask.exe, ask.ps1 -DestinationPath ask-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ask-windows
          path: dist/ask-windows.zip

  release:
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ask-ubuntu-latest/ask-ubuntu-latest-full.tar.gz
            ask-macos-latest/ask-macos-latest-full.tar.gz
            ask-windows/ask-windows.zip

